version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cribseekers-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: cribseekers
      POSTGRES_PASSWORD: cribseekers_password
      POSTGRES_DB: cribseekers_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - cribseekers-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cribseekers"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cribseekers-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - cribseekers-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: cribseekers-api-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"
      - "9229:9229" # Debug port
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://cribseekers:cribseekers_password@postgres:5432/cribseekers_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret_here
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret_here
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      PORT: 3001
      SOCKET_PORT: 3002
      API_PREFIX: api/v1
      LOG_LEVEL: debug
      LOG_FORMAT: pretty
      LOG_TO_FILE: "false"
      ENABLE_CACHING: "true"
      ENABLE_RATE_LIMITING: "true"
      ENABLE_METRICS: "true"
      ENABLE_WEBSOCKET: "true"
      ENABLE_AI_RECOMMENDATIONS: "true"
      ENABLE_GEO_SEARCH: "true"
      ENABLE_SCHEDULED_JOBS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
      - api_dev_logs:/app/logs
      - api_dev_uploads:/app/uploads
    networks:
      - cribseekers-dev-network
    command: pnpm start:dev --filter=@cribseekers/api

volumes:
  postgres_dev_data:
  redis_dev_data:
  api_dev_logs:
  api_dev_uploads:

networks:
  cribseekers-dev-network:
    driver: bridge
