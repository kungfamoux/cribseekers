apiVersion: v1
kind: Secret
metadata:
  name: cribseekers-secrets
  namespace: cribseekers
type: Opaque
stringData:
  database-url: "postgresql://cribseekers:CHANGE_ME_PASSWORD@postgres-service:5432/cribseekers"
  postgres-user: "cribseekers"
  postgres-password: "CHANGE_ME_PASSWORD"
  jwt-secret: "CHANGE_ME_JWT_SECRET"
  jwt-refresh-secret: "CHANGE_ME_JWT_REFRESH_SECRET"
  redis-password: ""
