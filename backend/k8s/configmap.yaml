apiVersion: v1
kind: ConfigMap
metadata:
  name: cribseekers-config
  namespace: cribseekers
data:
  API_PREFIX: "api"
  API_VERSION: "1"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  LOG_TO_FILE: "true"
  LOG_DIR: "/app/logs"
  ENABLE_CACHING: "true"
  ENABLE_RATE_LIMITING: "true"
  ENABLE_METRICS: "true"
  ENABLE_WEBSOCKET: "true"
  ENABLE_AI_RECOMMENDATIONS: "true"
  ENABLE_GEO_SEARCH: "true"
  ENABLE_SCHEDULED_JOBS: "true"
